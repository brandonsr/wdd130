<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Rapid Rush Rafting</title>
    <meta name="description"
      content="Get in touch with Rapid Rush Rafting. Find our contact information, speak with our team, or submit your inquiry through our contact form.">
    <meta name="author" content="Brandon Roldan">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rapid Rush Rafting Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <div class="hero">
            <img src="images/hero.jpg" alt="Rafters navigating exciting white water rapids">
            <h1>Contact Us</h1>
        </div>

        <!-- Company Information Section -->
        <section class="company-info">
            <h2>Get In Touch</h2>
            <div class="contact-details">
                <div class="info-block">
                    <h3>Address</h3>
                    <p>123 River Canyon Road<br>
                    Colorado Springs, CO 80904</p>
                </div>
                <div class="info-block">
                    <h3>Phone</h3>
                    <p><a href="tel:+17195551234">(719) 555-1234</a><br>
                    <a href="tel:+17195550567">(719) 555-0567</a></p>
                </div>
                <div class="info-block">
                    <h3>Email</h3>
                    <p><a href="mailto:info@rapidrushrafting.com">info@rapidrushrafting.com</a></p>
                </div>
            </div>

            <!-- Google Map Embed -->
            <div class="map-container">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3109.1839202203754!2d-104.8202072!3d38.8344!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87134b1c8d8d8d8d%3A0x1d8d8d8d8d8d8d8d!2s123%20River%20Canyon%20Road%2C%20Colorado%20Springs%2C%20CO%2080904!5e0!3m2!1sen!2sus!4v1234567890"
                    width="100%"
                    height="400"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>

        <!-- Employee Profiles Section -->
        <section class="employees">
            <h2>Meet Our Team</h2>
            <div class="employee-grid">
                <figure class="employee-card">
                    <img src="images/rafting1.jpg" alt="Sarah Mitchell, Lead Guide">
                    <figcaption>
                        <h3>Sarah Mitchell</h3>
                        <p>Lead Guide & Safety Director</p>
                    </figcaption>
                </figure>
                <figure class="employee-card">
                    <img src="images/rafting2.jpg" alt="Marcus Johnson, Trip Coordinator">
                    <figcaption>
                        <h3>Marcus Johnson</h3>
                        <p>Trip Coordinator</p>
                    </figcaption>
                </figure>
                <figure class="employee-card">
                    <img src="images/rafting3.jpg" alt="Elena Rodriguez, Customer Service Manager">
                    <figcaption>
                        <h3>Elena Rodriguez</h3>
                        <p>Customer Service Manager</p>
                    </figcaption>
                </figure>
            </div>
        </section>

        <!-- Contact Form Section -->
        <section class="contact-form-section">
            <h2>Send Us a Message</h2>
            <form class="contact-form" action="https://formspree.io/f/xvgzlpqb" method="POST">

                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>Purpose of Inquiry *</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" id="general" name="purpose" value="General Inquiry" required>
                            General Inquiry
                        </label>
                        <label class="radio-label">
                            <input type="radio" id="reservation" name="purpose" value="Reservation Question" required>
                            Reservation Question
                        </label>
                        <label class="radio-label">
                            <input type="radio" id="suggestion" name="purpose" value="Website Suggestion" required>
                            Website Suggestion
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <div class="form-group checkbox">
                    <label for="newsletter">
                        <input type="checkbox" id="newsletter" name="newsletter" value="yes">
                        Subscribe to our newsletter for exclusive offers and updates
                    </label>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy;2026 &#10070; Rapid Rush Rafting &#10070; Brandon Roldan</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
